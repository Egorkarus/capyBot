services:
  bot:
    build: .
    container_name: capybot
    restart: always
    # NOTE: Юзаем хостовую сеть. На обычном bridge докеровский NAT отрубает UDP-порт
    # во время скачивания следующего трека, из-за чего пропадает звук.
    network_mode: "host"
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
